<div class='row'>
  <h1>Gestión de municipios</h1>
</div>

<br />

<!-- Contenedor principal del filtro -->
<div class='bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-6' [formGroup]='form'>

  <!-- Rejilla de Filtros Inline (Inline-flex forzado) -->
  <div
    style='display: flex !important; flex-direction: row !important; align-items: flex-end !important; gap: 1rem !important; flex-wrap: wrap !important;'>

    <!-- Código de provincia -->
    <div style='display: flex; flex-direction: column; gap: 0.375rem; width: 150px;'>
      <label for='filtro-cpro' class='text-xs font-semibold text-slate-600'>Código de provincia</label>
      <input
        id='filtro-cpro'
        pInputText
        type='text'
        formControlName='cpro'
        placeholder='Ej. 01...'
        class='p-inputtext-sm w-full'
      />
    </div>

    <!-- Código de municipio -->
    <div style='display: flex; flex-direction: column; gap: 0.375rem; width: 150px;'>
      <label for='filtro-cmun' class='text-xs font-semibold text-slate-600'>Código de municipio</label>
      <input
        id='filtro-cmun'
        pInputText
        type='text'
        formControlName='cmun'
        placeholder='Ej. 001...'
        class='p-inputtext-sm w-full'
      />
    </div>

    <!-- Nombre -->
    <div style='display: flex; flex-direction: column; gap: 0.375rem; width: 250px;'>
      <label for='filtro-nombre' class='text-xs font-semibold text-slate-600'>Nombre</label>
      <input
        id='filtro-nombre'
        pInputText
        type='text'
        formControlName='nombre'
        placeholder='Ej. Ababuj...'
        class='p-inputtext-sm w-full'
      />
    </div>

  </div>

  <!-- Botones forzados por estilo en línea para evitar conflictos de CSS global -->
  <div
    style='display: flex !important; justify-content: flex-end !important; align-items: center !important; gap: 0.5rem !important; margin-top: 1.5rem !important; padding-top: 1rem !important; border-top: 1px solid #e2e8f0 !important; width: 100% !important;'>
    <p-button
      label='Limpiar'
      icon='pi pi-filter-slash'
      styleClass='p-button-outlined p-button-secondary p-button-sm'
      (onClick)='limpiar()'
    >
    </p-button>
    <p-button
      type='button'
      label='Buscar'
      icon='pi pi-search'
      styleClass='p-button-primary p-button-sm'
      (onClick)='buscar()'
    >
    </p-button>
  </div>

</div>

<br />

<p-table
  size='small'
  [value]='municipios'
  [tableStyle]="{ 'min-width': '50rem' }"
  [stripedRows]='true'
  [paginator]='true'
  [rows]='10'
  [rowsPerPageOptions]='[10, 20, 50, 100]'
  [showCurrentPageReport]='true'
  currentPageReportTemplate='Mostrando {first} a {last} de {totalRecords} registros'
  dataKey='id'
  [loading]='cargando'
  sortField='nombre'
  [sortOrder]='1'
>

  <ng-template pTemplate='header'>
    <tr>
      <th id='municipio.cpro' class='text-center' pSortableColumn='cpro' style='text-align: center; width: 10%'>C.
        Provincia
        <p-sortIcon field='cpro'></p-sortIcon>
      </th>
      <th id='municipio.cmun' class='text-center' pSortableColumn='cmun' style='text-align: center; width: 10%'>C.
        Municipio
        <p-sortIcon field='cmun'></p-sortIcon>
      </th>
      <!--
      <th id='municipio.dc' class='text-center' pSortableColumn='dc' style='text-align: center; width: 5%'>DC
        <p-sortIcon field='dc'></p-sortIcon>
      </th>
      -->
      <th id='municipio.nombre' pSortableColumn='nombre'>Nombre
        <p-sortIcon field='nombre'></p-sortIcon>
      </th>
      <th id='municipio.estado' class='text-center' style='width: 10%'>Estado</th>
      <th id='municipio.accion' class='text-right' style='width: 10%'></th>
    </tr>
  </ng-template>

  <ng-template pTemplate='emptymessage'>
    <tr>
      <td colspan='4'>
        <div style='display: flex; flex-direction: column; align-items: center; padding: 3rem; text-align: center;'>
          <svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none'
               stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'
               class='lucide lucide-circle-off-icon lucide-circle-off'>
            <path d='m2 2 20 20' />
            <path d='M8.35 2.69A10 10 0 0 1 21.3 15.65' />
            <path d='M19.08 19.08A10 10 0 1 1 4.92 4.92' />
          </svg>
          <p style='margin-top: 1rem; color: #64748b; font-weight: 600;'>No hay registros para mostrar</p>
        </div>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate='body' let-municipio>
    <tr>
      <td class='text-center' style='text-align: center'>{{ municipio.cpro }}</td>
      <td class='text-center' style='text-align: center'>{{ municipio.cmun }}</td>
      <!-- <td class='text-center' style='text-align: center'>{{ municipio.dc }}</td> -->
      <td>{{ municipio.nombre }}</td>
      <td class='centrado'>
        <label class="switch-native {{ municipio.activo ? 'verde' : 'rojo' }}">
          <input type='checkbox' [checked]='municipio.activo' disabled />
          <span class='slider-native'></span>
        </label>
      </td>
      <td
        style='display: flex !important; justify-content: flex-end !important; align-items: center !important; gap: 0.25rem !important;'>
        <p-button
          severity='secondary'
          [rounded]='true'
          [text]='true'>
          <svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none'
               stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'>
            <path d='M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z'></path>
          </svg>
        </p-button>

        <!-- Activar/desactivar -->
        <p-button
          severity='secondary'
          [rounded]='true'
          [text]='true'
          (onClick)='cambiarEstado(municipio.id)'
        >
          @if (municipio.activo) {
          <svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none'
               stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='color: blue'>
            <rect x='6' y='6' width='12' height='12' rx='2'></rect>
          </svg>
          } @else {
          <svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none'
             stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='color: green'>
            <polygon points='6 3 20 12 6 21 6 3'></polygon>
          </svg>
          }
        </p-button>

        <p-button
          severity='secondary'
          [rounded]='true'
          [text]='true'
          (onClick)='confirmarBorrado(municipio)'
        >
          <svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none'
               stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'
               class='text-red-600'
               style='color: red'>
            <path d='M3 6h18' />
            <path d='M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6' />
            <path d='M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2' />
            <line x1='10' y1='11' x2='10' y2='17' />
            <line x1='14' y1='11' x2='14' y2='17' />
          </svg>
        </p-button>
      </td>
    </tr>
  </ng-template>
</p-table>
